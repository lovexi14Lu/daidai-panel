name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          candidates=(
            "docs/release-notes/${GITHUB_REF_NAME}.md"
            "docs/release-notes/${{ steps.version.outputs.VERSION }}.md"
          )

          for candidate in "${candidates[@]}"; do
            if [[ -f "$candidate" ]]; then
              echo "file=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "::error::缺少更新日志文件，请先创建 docs/release-notes/${GITHUB_REF_NAME}.md"
          exit 1

      - name: Build Linux amd64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w -X daidai-panel/handler.Version=${{ steps.version.outputs.VERSION }}" -o daidai-linux-amd64 .

      - name: Build Linux arm64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w -X daidai-panel/handler.Version=${{ steps.version.outputs.VERSION }}" -o daidai-linux-arm64 .

      - name: Package
        run: |
          mkdir -p release
          cp server/config.yaml release/ 2>/dev/null || true
          cp -r web/dist release/web

          cp server/daidai-linux-amd64 release/
          cd release && tar -czvf ../daidai-linux-amd64.tar.gz daidai-linux-amd64 config.yaml web/
          rm daidai-linux-amd64

          cp ../server/daidai-linux-arm64 .
          tar -czvf ../daidai-linux-arm64.tar.gz daidai-linux-arm64 config.yaml web/
          cd ..

      - name: Create Or Update Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          NOTES_FILE="${{ steps.release_notes.outputs.file }}"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "$NOTES_FILE"
            gh release upload "${GITHUB_REF_NAME}" \
              daidai-linux-amd64.tar.gz \
              daidai-linux-arm64.tar.gz \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              daidai-linux-amd64.tar.gz \
              daidai-linux-arm64.tar.gz \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "$NOTES_FILE"
          fi

  magisk-module:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build Magisk Module - ARM64
        run: |
          MODULE_DIR=magisk-build
          rm -rf $MODULE_DIR
          mkdir -p $MODULE_DIR

          # Copy module files
          sed "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.VERSION }}/g; s/VERSIONCODE_PLACEHOLDER/$(echo '${{ steps.version.outputs.VERSION }}' | tr -d '.' | head -c 4)/g" magisk/module.json > $MODULE_DIR/module.json
          cp magisk/system.prop $MODULE_DIR/
          cp magisk/service.sh $MODULE_DIR/
          cp magisk/uninstall.sh $MODULE_DIR/
          cp -r magisk/META-INF $MODULE_DIR/

          # Build backend for Android ARM64
          cd server
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build \
            -ldflags="-s -w -X daidai-panel/handler.Version=${{ steps.version.outputs.VERSION }}" \
            -o ../$MODULE_DIR/daidai-server .

          # Build ddp command tool
          go build -ldflags="-s -w" -o ../$MODULE_DIR/ddp ./cmd/ddp
          cd ..

          # Copy frontend files
          mkdir -p $MODULE_DIR/web
          cp -r web/dist/* $MODULE_DIR/web/

          # Copy README
          cp magisk/README.md $MODULE_DIR/

          # Package module
          cd $MODULE_DIR
          zip -r "../daidai-panel-magisk-${{ steps.version.outputs.VERSION }}-arm64.zip" .
          cd ..

          echo "ARM64模块构建完成: daidai-panel-magisk-${{ steps.version.outputs.VERSION }}-arm64.zip"

      - name: Build Magisk Module - ARM (32-bit)
        run: |
          MODULE_DIR=magisk-build-arm
          rm -rf $MODULE_DIR
          mkdir -p $MODULE_DIR

          # Copy module files
          sed "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.VERSION }}/g; s/VERSIONCODE_PLACEHOLDER/$(echo '${{ steps.version.outputs.VERSION }}' | tr -d '.' | head -c 4)/g" magisk/module.json > $MODULE_DIR/module.json
          cp magisk/system.prop $MODULE_DIR/
          cp magisk/service.sh $MODULE_DIR/
          cp magisk/uninstall.sh $MODULE_DIR/
          cp -r magisk/META-INF $MODULE_DIR/

          # Build backend for Android ARM (32-bit)
          cd server
          CGO_ENABLED=0 GOOS=android GOARCH=arm go build \
            -ldflags="-s -w -X daidai-panel/handler.Version=${{ steps.version.outputs.VERSION }}" \
            -o ../$MODULE_DIR/daidai-server .

          # Build ddp command tool
          go build -ldflags="-s -w" -o ../$MODULE_DIR/ddp ./cmd/ddp
          cd ..

          # Copy frontend files
          mkdir -p $MODULE_DIR/web
          cp -r web/dist/* $MODULE_DIR/web/

          # Copy README
          cp magisk/README.md $MODULE_DIR/

          # Package module
          cd $MODULE_DIR
          zip -r "../daidai-panel-magisk-${{ steps.version.outputs.VERSION }}-arm.zip" .
          cd ..

          echo "ARM模块构建完成: daidai-panel-magisk-${{ steps.version.outputs.VERSION }}-arm.zip"

      - name: Upload Magisk Modules to Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            daidai-panel-magisk-${{ steps.version.outputs.VERSION }}-arm64.zip \
            daidai-panel-magisk-${{ steps.version.outputs.VERSION }}-arm.zip \
            --clobber

          echo "Magisk 模块已上传到 Release"

  docker-alpine:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=alpine
          cache-to: type=gha,mode=max,scope=alpine
          tags: |
            linzixuanzz/daidai-panel:latest
            linzixuanzz/daidai-panel:${{ steps.version.outputs.VERSION }}

  docker-debian:
    runs-on: ubuntu-latest
    needs: docker-alpine
    steps:
      - uses: actions/checkout@v5

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Debian multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.debian
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=debian
          cache-to: type=gha,mode=max,scope=debian
          tags: |
            linzixuanzz/daidai-panel:debian
