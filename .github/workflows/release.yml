name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build Linux amd64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags="-s -w" -o daidai-linux-amd64 .

      - name: Build Linux arm64
        working-directory: server
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags="-s -w" -o daidai-linux-arm64 .

      - name: Package
        run: |
          mkdir -p release
          cp server/config.yaml release/ 2>/dev/null || true
          cp -r web/dist release/web

          cp server/daidai-linux-amd64 release/
          cd release && tar -czvf ../daidai-linux-amd64.tar.gz daidai-linux-amd64 config.yaml web/
          rm daidai-linux-amd64

          cp ../server/daidai-linux-arm64 .
          tar -czvf ../daidai-linux-arm64.tar.gz daidai-linux-arm64 config.yaml web/
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            daidai-linux-amd64.tar.gz
            daidai-linux-arm64.tar.gz
